apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yaml --out ./kuber
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: datanode1
  name: datanode1
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: datanode1
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yaml --out ./kuber
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: datanode1
    spec:
      containers:
        - args:
            - bash
            - -c
            - hdfs datanode & yarn nodemanager
          env:
            - name: HDFS-SITE.XML_dfs.datanode.address
              value: 0.0.0.0:9867
            - name: HDFS-SITE.XML_dfs.datanode.hostname
              value: localhost
            - name: HDFS-SITE.XML_dfs.datanode.ipc.address
              value: 0.0.0.0:9865
          image: datanode1
          name: datanode1
          ports:
            - containerPort: 9864
              protocol: TCP
            - containerPort: 9865
              protocol: TCP
            - containerPort: 9867
              protocol: TCP
          volumeMounts:
            - mountPath: /opt/hadoop/etc/hadoop/core-site.xml
              name: datanode1-cm0
              subPath: core-site.xml
            - mountPath: /opt/hadoop/etc/hadoop/hdfs-site.xml
              name: datanode1-cm1
              subPath: hdfs-site.xml
            - mountPath: /opt/hadoop/etc/hadoop/mapred-site.xml
              name: datanode1-cm2
              subPath: mapred-site.xml
            - mountPath: /opt/hadoop/etc/hadoop/yarn-site.xml
              name: datanode1-cm3
              subPath: yarn-site.xml
      restartPolicy: Always
      volumes:
        - configMap:
            items:
              - key: core-site.xml
                path: core-site.xml
            name: datanode1-cm0
          name: datanode1-cm0
        - configMap:
            items:
              - key: hdfs-site.xml
                path: hdfs-site.xml
            name: datanode1-cm1
          name: datanode1-cm1
        - configMap:
            items:
              - key: mapred-site.xml
                path: mapred-site.xml
            name: datanode1-cm2
          name: datanode1-cm2
        - configMap:
            items:
              - key: yarn-site.xml
                path: yarn-site.xml
            name: datanode1-cm3
          name: datanode1-cm3
