apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yaml --out ./kuber
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: resourcemanager
  name: resourcemanager
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: resourcemanager
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yaml --out ./kuber
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: resourcemanager
    spec:
      containers:
        - args:
            - yarn
            - resourcemanager
          image: borisvikvik/hadoop-resourcemanager:latest
          name: resourcemanager
          ports:
            - containerPort: 8088
              protocol: TCP
          volumeMounts:
            - mountPath: /opt/test.sh
              name: resourcemanager-claim0
            - mountPath: /opt/hadoop/etc/hadoop/core-site.xml
              name: resourcemanager-cm1
              subPath: core-site.xml
            - mountPath: /opt/hadoop/etc/hadoop/hdfs-site.xml
              name: resourcemanager-cm2
              subPath: hdfs-site.xml
            - mountPath: /opt/hadoop/etc/hadoop/mapred-site.xml
              name: resourcemanager-cm3
              subPath: mapred-site.xml
            - mountPath: /opt/hadoop/etc/hadoop/yarn-site.xml
              name: resourcemanager-cm4
              subPath: yarn-site.xml
      hostname: resourcemanager
      restartPolicy: Always
      volumes:
        - name: resourcemanager-claim0
          persistentVolumeClaim:
            claimName: resourcemanager-claim0
        - configMap:
            items:
              - key: core-site.xml
                path: core-site.xml
            name: resourcemanager-cm1
          name: resourcemanager-cm1
        - configMap:
            items:
              - key: hdfs-site.xml
                path: hdfs-site.xml
            name: resourcemanager-cm2
          name: resourcemanager-cm2
        - configMap:
            items:
              - key: mapred-site.xml
                path: mapred-site.xml
            name: resourcemanager-cm3
          name: resourcemanager-cm3
        - configMap:
            items:
              - key: yarn-site.xml
                path: yarn-site.xml
            name: resourcemanager-cm4
          name: resourcemanager-cm4
