apiVersion: v1
data:
  hdfs-site.xml: |-
    <configuration>
    <property><name>dfs.client.use.datanode.hostname</name><value>true</value></property>
    <property><name>dfs.permissions.enabled</name><value>false</value></property>
    <property><name>dfs.datanode.use.datanode.hostname</name><value>true</value></property>
    <property><name>dfs.replication</name><value>1</value></property>
    <property><name>dfs.namenode.rpc-address</name><value>namenode:8020</value></property>
    </configuration>
kind: ConfigMap
metadata:
  annotations:
    use-subpath: "true"
  labels:
    io.kompose.service: nodemanager
  name: nodemanager-cm1
