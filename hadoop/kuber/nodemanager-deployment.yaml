apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yaml --out ./kuber
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: nodemanager
  name: nodemanager
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: nodemanager
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yaml --out ./kuber
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: nodemanager
    spec:
      containers:
        - args:
            - yarn
            - nodemanager
          image: nodemanager
          name: nodemanager
          volumeMounts:
            - mountPath: /opt/hadoop/etc/hadoop/core-site.xml
              name: nodemanager-cm0
              subPath: core-site.xml
            - mountPath: /opt/hadoop/etc/hadoop/hdfs-site.xml
              name: nodemanager-cm1
              subPath: hdfs-site.xml
            - mountPath: /opt/hadoop/etc/hadoop/mapred-site.xml
              name: nodemanager-cm2
              subPath: mapred-site.xml
            - mountPath: /opt/hadoop/etc/hadoop/yarn-site.xml
              name: nodemanager-cm3
              subPath: yarn-site.xml
      restartPolicy: Always
      volumes:
        - configMap:
            items:
              - key: core-site.xml
                path: core-site.xml
            name: nodemanager-cm0
          name: nodemanager-cm0
        - configMap:
            items:
              - key: hdfs-site.xml
                path: hdfs-site.xml
            name: nodemanager-cm1
          name: nodemanager-cm1
        - configMap:
            items:
              - key: mapred-site.xml
                path: mapred-site.xml
            name: nodemanager-cm2
          name: nodemanager-cm2
        - configMap:
            items:
              - key: yarn-site.xml
                path: yarn-site.xml
            name: nodemanager-cm3
          name: nodemanager-cm3
